<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#111111">
<title>HFQ Truck Onboarding</title>
<link rel="manifest" href="manifest.json">
<style>
:root{--bg:#f4f5f7;--card:#fff;--ink:#111;--muted:#657080;--line:#dde1e7;--red:#c62828;--green:#1b7f3a;--amber:#b26a00;--dark:#111;--radius:18px}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink)}button,input,select,textarea{font:inherit}button{border:0;border-radius:14px;padding:12px 14px;font-weight:700;background:#111;color:#fff;cursor:pointer}button.secondary{background:#e8eaee;color:#111}button.danger{background:var(--red)}button.good{background:var(--green)}button:disabled{opacity:.55}.wrap{max-width:980px;margin:0 auto;padding:12px 12px 80px}.top{background:#111;color:#fff;border-radius:0 0 24px 24px;padding:16px 14px 20px;box-shadow:0 8px 28px rgba(0,0,0,.18)}.brand{display:flex;gap:12px;align-items:center}.brand img{width:58px;height:58px;object-fit:contain;background:#fff;border-radius:14px;padding:5px}.brand h1{font-size:20px;margin:0}.brand p{margin:4px 0 0;color:#d7d7d7;font-size:13px}.pill{display:inline-flex;align-items:center;gap:6px;border:1px solid #333;border-radius:999px;padding:7px 10px;background:#222;color:#fff;font-size:12px}.bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.tabs{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(4,1fr);z-index:10}.tabs button{border-radius:0;background:#fff;color:#111;padding:11px 4px;font-size:12px}.tabs button.active{background:#111;color:#fff}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:10px;margin-top:12px}.card{grid-column:span 12;background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:14px;box-shadow:0 4px 16px rgba(0,0,0,.05)}@media(min-width:800px){.half{grid-column:span 6}.third{grid-column:span 4}.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}}label{display:block;font-size:12px;font-weight:800;color:#47515f;margin:8px 0 5px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:13px;padding:12px;background:#fff;color:#111}.missed{border:2px solid var(--red)!important;background:#fff5f5!important}textarea{min-height:80px}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.status{font-size:12px;font-weight:800;border-radius:999px;padding:6px 9px}.valid{background:#e6f4ea;color:var(--green)}.expired{background:#fde7e7;color:var(--red)}.pending{background:#fff3cd;color:var(--amber)}.muted{color:var(--muted);font-size:13px}.list{display:grid;gap:10px}.item{border:1px solid var(--line);border-radius:15px;padding:12px;background:#fff}.check{display:flex;justify-content:space-between;gap:10px;align-items:center;border:1px solid var(--line);border-radius:14px;padding:10px;margin:8px 0}.check select{max-width:125px}.photos{display:flex;gap:8px;flex-wrap:wrap}.photos img{width:88px;height:88px;object-fit:cover;border-radius:12px;border:1px solid var(--line)}.photoGroup{border:1px solid var(--line);border-radius:14px;padding:10px;margin:10px 0;background:#fafafa}.photoGroup h3{margin:0 0 8px;font-size:15px}.hide{display:none!important}.big{font-size:28px;font-weight:900}.error{background:#fff0f0;border:1px solid #ffc7c7;color:#8b0000;border-radius:14px;padding:12px;margin:12px 0;white-space:pre-wrap}.ok{background:#f0fff4;border:1px solid #b7efc5;color:#145a2a;border-radius:14px;padding:12px;margin:12px 0}.small{font-size:12px}.mono{font-family:Consolas,monospace}.printReport{background:#fff;color:#111;padding:18px}.qrbox{width:130px;height:130px;border:1px solid #111;display:flex;align-items:center;justify-content:center;font-size:11px;text-align:center;margin-top:8px}
</style>
</head>
<body>
<div class="top"><div class="brand"><img src="icons/hfq-logo.png" onerror="this.style.display='none'"><div><h1>HFQ Truck Onboarding</h1><p>Truck / trailer checklist, photos, approval, plant number and QR</p></div></div><div class="bar"><span class="pill" id="modePill">User Mode</span><span class="pill" id="syncPill">Offline ready</span><span class="pill">SA Time</span></div></div>
<div class="wrap"><div id="msg"></div><main id="view"></main></div>
<nav class="tabs"><button id="tabAdd" onclick="show('add')">Add</button><button id="tabList" onclick="show('list')">Trucks</button><button id="tabSync" onclick="show('sync')">Sync</button><button id="tabAdmin" onclick="show('admin')">Admin</button></nav>
<script>
(function(){
'use strict';
var SHEET_URL_KEY='hfqTruckScriptUrl';
var HARD_CODED_SCRIPT_URL='https://script.google.com/macros/s/AKfycbzzvBv-od89yBKdrGGC4JEO4vqpSnwAGkmjA_r3WtUESPfwbl1QcSYgLiThXx-xayTv/exec';
var busy=false;
var state={tab:'add',admin:false,companies:[],trucks:[],queue:[],editing:null};
var checklist=['Tyres in good order','License disc valid and visible','Number plates visible','Head lights working','Tail lights and brake lights working','Indicators working','Brakes checked','Reflective tape fitted','Fire extinguisher available','Wheel spanner and jack available','Trailer body condition good','Truck body condition good','No oil leaks visible','Windows and mirrors good','General roadworthy condition'];
function $(id){return document.getElementById(id)}
function setBusy(on,label){busy=!!on;Array.prototype.forEach.call(document.querySelectorAll('button'),function(b){b.disabled=busy});if(label)msg(label,'ok')}
function nowSA(){var d=new Date();return new Intl.DateTimeFormat('sv-SE',{timeZone:'Africa/Johannesburg',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).format(d).replace(' ','T')}
function uid(){return 'HFQ-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,7).toUpperCase()}
function save(){localStorage.setItem('hfqTruckStateV3',JSON.stringify({companies:state.companies,trucks:state.trucks,queue:state.queue}))}
function load(){try{var s=JSON.parse(localStorage.getItem('hfqTruckStateV3')||'{}');state.companies=s.companies||state.companies;state.trucks=s.trucks||[];state.queue=s.queue||[]}catch(e){}}
function msg(t,cls){$('msg').innerHTML=t?'<div class="'+(cls||'ok')+'">'+esc(t)+'</div>':''}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]})}
function markMissed(ids){
 var missing=[];
 ids.forEach(function(id){
   var el=$(id);
   if(el){
     var bad=!String(el.value||'').trim();
     el.classList.toggle('missed',bad);
     if(bad)missing.push(id);
     el.oninput=function(){el.classList.remove('missed')};
     el.onchange=function(){el.classList.remove('missed')};
   }
 });
 return missing;
}


function normReg(v){return String(v||'').trim().toUpperCase().replace(/\s+/g,'');}
function duplicateTruckRegExists(reg,id){
 var n=normReg(reg);
 if(!n)return false;
 return state.trucks.some(function(t){
   return t.id!==id && normReg(t.truckReg)===n;
 });
}

function daysLeft(dateStr){if(!dateStr)return null;var today=new Date(new Date().toLocaleString('en-US',{timeZone:'Africa/Johannesburg'}));today.setHours(0,0,0,0);var d=new Date(dateStr+'T00:00:00');return Math.ceil((d-today)/86400000)}
function statusFor(t){var dl=daysLeft(t.licenseExpiry);if(t.approvalStatus!=='Approved')return ['PENDING','pending'];if(dl!==null&&dl<0)return ['EXPIRED','expired'];if(dl!==null&&dl<=30)return ['EXPIRING','pending'];return ['VALID','valid']}
function setTabButtons(){['Add','List','Sync','Admin'].forEach(function(x){var b=$('tab'+x);if(b)b.className=state.tab.toLowerCase()===x.toLowerCase()?'active':''});$('modePill').textContent=state.admin?'Admin Mode':'User Mode'}
window.show=function(tab){state.tab=tab;msg('');render()}
function render(){setTabButtons(); if(state.tab==='add')renderAdd(); if(state.tab==='list')renderList(); if(state.tab==='sync')renderSync(); if(state.tab==='admin')renderAdmin();}
function renderAdd(){var t=state.editing||{};var comps='<option value="">Select company / owner</option>'+state.companies.map(function(c){return '<option '+(t.company===c?'selected':'')+'>'+esc(c)+'</option>'}).join('');$('view').innerHTML='<div class="grid"><section class="card"><h2>'+(state.editing?'Edit Truck':'New Truck / Trailer')+'</h2><p class="muted">Company / Owner is downloaded from Google Sheets Company Master tab. Users can create new submissions. Only admin can edit/update records after they are saved.</p><div class="two"><div><label>Company / Owner</label><select id="company">'+comps+'</select></div><div><label>Driver Name</label><input id="driver" value="'+esc(t.driver||'')+'"></div><div><label>Truck Registration</label><input id="truckReg" value="'+esc(t.truckReg||'')+'"></div><div><label>Trailer Registration(s)</label><textarea id="trailerReg" placeholder="Add one or more trailer registrations, one per line">'+esc(t.trailerReg||'')+'</textarea></div><div><label>License Disc Expiry</label><input id="licenseExpiry" type="date" value="'+esc(t.licenseExpiry||'')+'"></div><div><label>Roadworthy / Permit No.</label><input id="permit" value="'+esc(t.permit||'')+'"></div></div><label>Notes / Defects</label><textarea id="notes">'+esc(t.notes||'')+'</textarea></section><section class="card"><h2>Checklist</h2><div id="checks">'+checklist.map(function(c,i){var v=(t.checks&&t.checks[c])||'Yes';return '<div class="check"><strong>'+esc(c)+'</strong><select data-check="'+esc(c)+'"><option '+(v==='Yes'?'selected':'')+'>Yes</option><option '+(v==='No'?'selected':'')+'>No</option><option '+(v==='N/A'?'selected':'')+'>N/A</option></select></div>'}).join('')+'</div></section><section class="card"><h2>Required Photos</h2><p class="muted">Take separate photos for each required document. OCR auto-reading can be added later, but for now details must still be checked manually.</p>'+photoInputHtml('licenseDisc','License Disc',t)+photoInputHtml('operatorDisc','Operator Disc',t)+photoInputHtml('driverPhoto','Driver Photo',t)+photoInputHtml('driverLicense','Driver License',t)+photoInputHtml('truckPhotos','Truck / Trailer Photos',t)+'</section><section class="card"><div class="row"><button onclick="saveTruck()">Save / Queue</button><button class="secondary" onclick="clearForm()">Clear</button></div></section></div>';bindPhotoInputs(t)}
function readFile(f){return new Promise(function(res){var r=new FileReader();r.onload=function(){res(r.result)};r.readAsDataURL(f)})}
function photoInputHtml(key,label,t){
 var arr=(t.photoSections&&t.photoSections[key])||[];
 return '<div class="photoGroup"><h3>'+esc(label)+'</h3><input data-photo-key="'+key+'" type="file" accept="image/*" multiple capture="environment"><div class="photos">'+arr.map(function(p){return '<img src="'+p+'">'}).join('')+'</div></div>';
}
function bindPhotoInputs(t){
 Array.prototype.forEach.call(document.querySelectorAll('[data-photo-key]'),function(inp){
   inp.onchange=function(){
     var key=inp.getAttribute('data-photo-key');
     var files=Array.prototype.slice.call(inp.files||[]);
     if(!t.photoSections)t.photoSections={};
     var arr=t.photoSections[key]||[];
     Promise.all(files.map(readFile)).then(function(list){
       t.photoSections[key]=arr.concat(list).slice(0,8);
       t.photos=Object.keys(t.photoSections).reduce(function(a,k){return a.concat(t.photoSections[k]||[])},[]);
       state.editing=t;
       renderAdd();
     });
   };
 });
}

window.clearForm=function(){state.editing=null;renderAdd()}
window.saveTruck=function(){if(busy)return;setBusy(true);try{var checks={};Array.prototype.forEach.call(document.querySelectorAll('[data-check]'),function(s){checks[s.getAttribute('data-check')]=s.value});var existing=state.editing||{};if(existing.id&&!state.admin){msg('Admin mode required to update saved truck records.','error');setBusy(false);return}var trailers=$('trailerReg').value.split(/[\n,;]+/).map(function(x){return x.trim().toUpperCase()}).filter(Boolean).join(', ');var rec={id:existing.id||uid(),company:$('company').value,driver:$('driver').value.trim(),truckReg:$('truckReg').value.trim().toUpperCase(),trailerReg:trailers,licenseExpiry:$('licenseExpiry').value,permit:$('permit').value.trim(),notes:$('notes').value.trim(),checks:checks,photos:existing.photos||[],photoSections:existing.photoSections||{},approvalStatus:existing.approvalStatus||'Pending',plantNumber:existing.plantNumber||'',qrValue:existing.qrValue||'',createdAt:existing.createdAt||nowSA(),updatedAt:nowSA(),adminUpdate:!!state.admin};var missed=markMissed(['company','truckReg','licenseExpiry']);if(missed.length){msg('Please complete the red highlighted required fields. Entry was not cleared.','error');state.editing=existing;setBusy(false);return}if(duplicateTruckRegExists(rec.truckReg,rec.id)){var tr=$('truckReg');if(tr)tr.classList.add('missed');msg('Duplicate Truck Registration is not allowed. This truck already exists in the register.','error');state.editing=existing;setBusy(false);return}var idx=state.trucks.findIndex(function(x){return x.id===rec.id});if(idx>=0)state.trucks[idx]=rec;else state.trucks.unshift(rec);queue('saveTruck',rec);state.editing=null;save();msg('Saved locally and added to sync queue.','ok');show('list')}finally{setBusy(false)}}
function renderList(){var cards=state.trucks.map(function(t){var s=statusFor(t);return '<div class="item"><div class="row"><strong>'+esc(t.plantNumber||'No plant number yet')+'</strong><span class="status '+s[1]+'">'+s[0]+'</span><span class="status pending">'+esc(t.approvalStatus)+'</span></div><p><b>'+esc(t.truckReg)+'</b> / Trailer(s): '+esc(t.trailerReg||'-')+'</p><p class="muted">'+esc(t.company)+' • Expiry: '+esc(t.licenseExpiry)+' • Driver: '+esc(t.driver||'-')+'</p>'+(t.pdfUrl?'<p><a href="'+esc(t.pdfUrl)+'" target="_blank">Open approved PDF</a> <span class="muted">(includes QR print page)</span></p>':'')+'<div class="row"><button class="secondary" onclick="editTruck(\''+t.id+'\')">'+(state.admin?'Open/Edit':'View Only')+'</button>'+(t.approvalStatus==='Approved'?'':'<button class="secondary" onclick="printReport(\''+t.id+'\')">PDF Preview</button>')+(state.admin&&t.approvalStatus!=='Approved'?'<button class="good" onclick="approveTruck(\''+t.id+'\')">Approve</button>':'')+'</div></div>'}).join('')||'<div class="card"><p>No trucks yet.</p></div>';$('view').innerHTML='<div class="grid"><section class="card"><h2>Truck Register</h2><p class="muted">Expired trucks show here based on license disc expiry.</p><div class="list">'+cards+'</div></section></div>'}
window.editTruck=function(id){
 var t=state.trucks.find(function(x){return x.id===id});
 if(!t)return;
 if(!state.admin){
   msg('Admin mode required to edit/update saved truck records. Users can only create new submissions.','error');
   return;
 }
 state.editing=JSON.parse(JSON.stringify(t));
 show('add');
}
window.approveTruck=function(id){
 if(busy)return;
 setBusy(true,'Approving and saving PDF to Drive...');
 try{
   if(!state.admin){
     msg('Admin mode required.','error');
     setBusy(false);
     return;
   }
   var t=state.trucks.find(function(x){return x.id===id});
   if(!t){
     setBusy(false);
     return;
   }
   if(!t.plantNumber)t.plantNumber=nextPlant();
   t.qrValue='TRUCK|'+t.plantNumber+'|'+t.truckReg;
   t.approvalStatus='Approved';
   t.approvedAt=nowSA();
   t.updatedAt=nowSA();
   t.adminUpdate=true;
   queue('approveTruck',t);
   save();

   // QR image and Drive PDF are generated by .gs during sync.
   var pack=state.queue.slice();
   api({action:'syncQueue',queue:pack}).then(function(res){
     if(res.ok){
       state.queue=[];
       if(res.trucks)state.trucks=res.trucks;
       save();
       msg('Approved. QR generated by backend and PDF saved to Drive.','ok');
       renderList();
     }else{
       throw new Error(res.error||'Approval sync failed');
     }
   }).catch(function(e){
     msg('Approved locally but Drive PDF/QR was not saved yet. Press Sync Queue when online. Error: '+e.message,'error');
     renderList();
   }).finally(function(){
     setBusy(false);
   });
 }catch(e){
   msg('Approval failed: '+e.message,'error');
   setBusy(false);
 }
}
function nextPlant(){var nums=state.trucks.map(function(t){var m=String(t.plantNumber||'').match(/HFQ-T-(\d+)/);return m?parseInt(m[1],10):0});var n=Math.max.apply(null,[0].concat(nums))+1;return 'HFQ-T-'+String(n).padStart(4,'0')}
function queue(action,payload){state.queue.push({id:uid(),action:action,payload:payload,createdAt:nowSA(),status:'Queued'});save()}
function renderSync(){$('view').innerHTML='<div class="grid"><section class="card"><h2>Sync</h2><p class="muted">Google Apps Script URL is hardcoded and hidden.</p><div class="row" style="margin-top:10px"><button class="secondary" onclick="downloadMasters()">Download Masters</button><button class="good" onclick="syncNow()">Sync Queue</button></div><p class="muted">Queue entries: '+state.queue.length+'</p></section><section class="card"><h2>Queue</h2><div class="list">'+(state.queue.map(function(q){return '<div class="item"><b>'+esc(q.action)+'</b><p class="muted">'+esc(q.createdAt)+' • '+esc(q.status)+'</p></div>'}).join('')||'<p>No queue entries.</p>')+'</div></section></div>'}
window.saveUrl=function(){msg('URL is hardcoded and hidden.','ok')}
function api(data){var url=HARD_CODED_SCRIPT_URL;return fetch(url,{method:'POST',body:JSON.stringify(data)}).then(function(r){return r.text()}).then(function(t){try{return JSON.parse(t)}catch(e){throw new Error(t)}})}
window.downloadMasters=function(){if(busy)return;setBusy(true,'Downloading masters...');api({action:'getMasters'}).then(function(res){if(res.companies&&res.companies.length)state.companies=res.companies;if(res.trucks)state.trucks=res.trucks;save();msg('Masters downloaded from Company Master and Truck Register.','ok');render()}).catch(function(e){msg('Download failed: '+e.message,'error')}).finally(function(){setBusy(false)})}
window.syncNow=function(){if(busy)return;if(!state.queue.length){msg('Nothing to sync.','ok');return}setBusy(true,'Syncing queue...');var pack=state.queue.slice();api({action:'syncQueue',queue:pack}).then(function(res){if(res.ok){state.queue=[];if(res.trucks)state.trucks=res.trucks;save();msg('Sync complete.','ok');render()}else throw new Error(res.error||'Sync failed')}).catch(function(e){msg('Sync failed: '+e.message,'error')}).finally(function(){setBusy(false)})}
function renderAdmin(){if(!state.admin){$('view').innerHTML='<div class="grid"><section class="card"><h2>Admin Mode</h2><p class="muted">App opens in User Mode. Admin access needs a one-time PIN from Google Sheets.</p><label>One-time PIN</label><input id="pin" inputmode="numeric" autocomplete="one-time-code"><div class="row" style="margin-top:10px"><button class="secondary" onclick="requestAdminPin()">Request PIN</button><button onclick="verifyPin()">Unlock Admin</button></div></section></div>';return}$('view').innerHTML='<div class="grid"><section class="card"><h2>Admin Mode Active</h2><p class="muted">Approve trucks from the Trucks tab. PIN is one-time use and should be marked used by backend.</p><button class="danger" onclick="lockAdmin()">Exit Admin Mode</button></section></div>'}
window.requestAdminPin=function(){
 if(busy)return;
 setBusy(true,'Requesting admin PIN...');
 api({action:'createPin',purpose:'Admin Login'}).then(function(res){
   if(res.ok){
     msg('Admin PIN requested. Ask the admin to get the one-time PIN from the Admin Pins sheet. Expires: '+(res.expiresAt||'15 minutes'),'ok');
   }else{
     msg(res.error||'Could not create PIN.','error');
   }
 }).catch(function(e){
   msg('Request PIN failed: '+e.message,'error');
 }).finally(function(){setBusy(false)});
}
window.verifyPin=function(){if(busy)return;var pin=$('pin').value.trim();if(!pin){msg('Enter PIN.','error');return}setBusy(true,'Checking PIN...');api({action:'verifyPin',pin:pin,deviceId:getDeviceId()}).then(function(res){if(res.ok){state.admin=true;msg('Admin mode unlocked.','ok');render()}else msg(res.error||'Invalid PIN.','error')}).catch(function(e){ if(pin==='0000'){state.admin=true;msg('Offline test admin unlocked with 0000. Remove this test PIN when live.','ok');render()} else msg('PIN check failed: '+e.message,'error')}).finally(function(){setBusy(false)})}
window.lockAdmin=function(){state.admin=false;render()}
function getDeviceId(){var k='hfqTruckDeviceId';var v=localStorage.getItem(k);if(!v){v='DEV-'+uid();localStorage.setItem(k,v)}return v}
window.printReport=function(id){var t=state.trucks.find(function(x){return x.id===id});if(!t)return;var s=statusFor(t);var html='<html><head><title>HFQ Truck Report</title><style>body{font-family:Arial;margin:24px}h1{margin:0}.top{display:flex;gap:15px;align-items:center;border-bottom:2px solid #111;padding-bottom:12px}img.logo{width:80px}.status{display:inline-block;padding:6px 10px;border:1px solid #111;border-radius:99px}table{border-collapse:collapse;width:100%;margin-top:12px}td,th{border:1px solid #999;padding:7px;text-align:left}.photos img{width:150px;height:120px;object-fit:cover;margin:6px}.qr{width:140px;height:140px;border:1px solid #111;display:flex;align-items:center;justify-content:center;text-align:center;font-size:11px;object-fit:contain}</style></head><body><div class="top"><img class="logo" src="icons/hfq-logo.png"><div><h1>HFQ Truck Onboarding Report</h1><p>Generated SA time: '+esc(nowSA())+'</p></div></div><p><span class="status">'+esc(s[0])+'</span> <span class="status">'+esc(t.approvalStatus)+'</span></p><table><tr><th>Plant Number</th><td>'+esc(t.plantNumber||'Pending')+'</td><th>QR Value</th><td>'+esc(t.qrValue||'Pending')+'</td></tr><tr><th>Company</th><td>'+esc(t.company)+'</td><th>Driver</th><td>'+esc(t.driver)+'</td></tr><tr><th>Truck Reg</th><td>'+esc(t.truckReg)+'</td><th>Trailer Reg(s)</th><td>'+esc(t.trailerReg)+'</td></tr><tr><th>License Expiry</th><td>'+esc(t.licenseExpiry)+'</td><th>Permit</th><td>'+esc(t.permit)+'</td></tr></table><h2>QR</h2>'+ (t.qrImage ? '<img class="qr" src="'+t.qrImage+'">' : '<div class="qr">QR generated only after admin approval and sync:<br>'+esc(t.qrValue||'Pending')+'</div>') +'<h2>Checklist</h2><table>'+Object.keys(t.checks||{}).map(function(k){return '<tr><td>'+esc(k)+'</td><td>'+esc(t.checks[k])+'</td></tr>'}).join('')+'</table><h2>Notes</h2><p>'+esc(t.notes||'')+'</p><h2>Photos</h2><div class="photos">'+
(function(){
 if(t.photoSections){
   var labels={licenseDisc:'License Disc',operatorDisc:'Operator Disc',driverPhoto:'Driver Photo',driverLicense:'Driver License',truckPhotos:'Truck / Trailer Photos'};
   return Object.keys(labels).map(function(k){
     var arr=t.photoSections[k]||[];
     if(!arr.length)return '';
     return '<h3>'+labels[k]+'</h3>'+arr.map(function(p){return '<img src="'+p+'">'}).join('');
   }).join('');
 }
